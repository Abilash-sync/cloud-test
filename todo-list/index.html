<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>My Tasks</h1>
            <p>Keep track of your daily activities.</p>
        </header>
        
        <div class="input-section">
            <input type="text" id="task-input" placeholder="What needs to be done?">
            <button id="add-btn"><i class="fas fa-plus"></i></button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Sample Items for initial layout visualization -->
            <li class="todo-item">
                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                </label>
                <span class="task-text">Design a new website</span>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
            </li>
            <li class="todo-item completed">
                <label class="checkbox-container">
                    <input type="checkbox" checked>
                    <span class="checkmark"></span>
                </label>
                <span class="task-text">Buy groceries</span>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
            </li>
            <li class="todo-item">
                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                </label>
                <span class="task-text">Finish the SASS project</span>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
            </li>
        </ul>

        <footer>
            <span id="task-count">2 items left</span>
            <button id="clear-completed">Clear Completed</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
