<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in • Code Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0f1220;
      --bg-2: #0b0e19;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e8ecf1;
      --muted: #9aa3af;
      --accent: #7c8cff;
      --accent-2: #6ef3c5;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 800px at 10% -10%, rgba(124, 140, 255, 0.25), transparent 50%),
        radial-gradient(800px 600px at 100% 0%, rgba(110, 243, 197, 0.18), transparent 40%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 420px; position: relative; }

    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .brand-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 24px rgba(124, 140, 255, 0.35);
    }
    .brand-name { font-family: "Sora", system-ui, sans-serif; font-weight: 700; letter-spacing: 0.2px; }

    .card {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .card h1 {
      font-family: "Sora", system-ui, sans-serif;
      font-size: 28px; line-height: 1.15; margin: 6px 0 8px;
    }
    .card p.sub { color: var(--muted); font-size: 14px; margin: 0 0 18px; }

    .form { display: grid; gap: 16px; }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }

    .input {
      width: 100%; background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text); height: 46px; border-radius: 12px; padding: 0 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input::placeholder { color: #9aa3afcc; }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 140, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
    }

    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-top: -4px; }

    .checkbox { display: flex; align-items: center; gap: 8px; user-select: none; }
    .checkbox input {
      appearance: none; width: 18px; height: 18px; border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.03); display: grid; place-content: center; transition: all 0.2s;
    }
    .checkbox input:checked {
      border-color: var(--accent);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 3px 12px rgba(124, 140, 255, 0.4);
    }
    .checkbox input:checked::after { content: ""; width: 10px; height: 10px; background: white; border-radius: 3px; }

    .link { color: var(--text); text-decoration: none; border-bottom: 1px dashed rgba(255, 255, 255, 0.3); padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
    .link:hover { color: #fff; border-color: #fff; }

    .btn {
      margin-top: 6px; height: 48px; border: 0; border-radius: 12px;
      color: #0b0e19; font-weight: 700; letter-spacing: 0.2px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(110, 243, 197, 0.2), 0 8px 24px rgba(124, 140, 255, 0.2);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 36px rgba(110, 243, 197, 0.28), 0 12px 28px rgba(124, 140, 255, 0.28); }
    .btn:active { transform: translateY(0); }

    .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; margin: 14px 0; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent); }

    .help { text-align: center; color: var(--muted); font-size: 13px; margin-top: 16px; }
    .help a { color: var(--accent-2); text-decoration: none; font-weight: 600; }

    .footer-note { text-align: center; font-size: 12px; color: #8b93a7; margin-top: 18px; }

    @media (max-width: 420px) { .card { padding: 22px; } .card h1 { font-size: 24px; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

    .bg-ornament {
      position: absolute; inset: -100px -60px auto auto; width: 260px; height: 260px;
      background:
        radial-gradient(closest-side, rgba(124, 140, 255, 0.35), transparent),
        conic-gradient(from 180deg at 50% 50%, rgba(110, 243, 197, 0.32), rgba(124, 140, 255, 0.25), rgba(110, 243, 197, 0.32));
      filter: blur(40px); border-radius: 50%; opacity: 0.7; animation: float 12s ease-in-out infinite;
    }
    .bg-ornament.left { left: -60px; right: auto; top: auto; bottom: -60px; width: 320px; height: 320px; }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-10px) translateX(6px) scale(1.02); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-ornament" aria-hidden="true"></div>
    <div class="bg-ornament left" aria-hidden="true"></div>

    <div class="brand" aria-label="Brand">
      <div class="brand-icon" aria-hidden="true"></div>
      <div class="brand-name">Code Studio</div>
    </div>

    <section class="card" role="region" aria-labelledby="signin-title">
      <h1 id="signin-title">Welcome back</h1>
      <p class="sub">Sign in to your account</p>

      <form class="form" id="loginForm" novalidate>
        <div>
          <label class="label" for="email">Email address</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@domain.com" autocomplete="email" required />
        </div>

        <div>
          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" minlength="6" required />
        </div>

        <div class="row">
          <label class="checkbox" for="remember">
            <input id="remember" name="remember" type="checkbox" />
            <span>Remember me</span>
          </label>
          <a class="link" href="#">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Sign in</button>

        <div class="divider" aria-hidden="true">or</div>
        <p class="help">Don't have an account? <a href="#">Create one</a></p>
      </form>
    </section>

    <p class="footer-note">By continuing you agree to our Terms and Privacy Policy.</p>
  </div>
</body>
</html>
