<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #111113;
            --border: #1f1f23;
            --text: #e8e6e1;
            --muted: #6b6963;
            --accent: #d4a853;
            --accent-glow: rgba(212, 168, 83, 0.35);
            --danger: #c45c4a;
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--grain);
            pointer-events: none;
            z-index: 1;
        }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 56px 48px 48px;
            opacity: 0;
            transform: translateY(24px);
            animation: reveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 48px;
            right: 48px;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow);
            opacity: 0;
            animation: lineIn 1.2s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes lineIn {
            to { opacity: 1; }
        }

        .header {
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-family: 'Oranienbaum', serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.02em;
        }

        .form-group {
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.7s 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .form-group:nth-child(3) { animation-delay: 0.45s; }
        .form-group:nth-child(4) { animation-delay: 0.55s; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: var(--accent);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.92rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        input::placeholder {
            color: #3a3a3e;
        }

        input:focus {
            border-bottom-color: var(--accent);
            box-shadow: 0 1px 0 0 var(--accent);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.7s 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--muted);
            transition: color 0.3s ease;
        }

        .remember:hover {
            color: var(--text);
        }

        .remember input {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: transparent;
            position: relative;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .remember input:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .remember input:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid var(--bg);
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }

        .forgot {
            color: var(--muted);
            text-decoration: none;
            position: relative;
            transition: color 0.3s ease;
        }

        .forgot::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .forgot:hover {
            color: var(--accent);
        }

        .forgot:hover::after {
            width: 100%;
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--bg);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.7s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(212, 168, 83, 0.25);
        }

        button[type="submit"]:hover::before {
            transform: translateX(100%);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .signup {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: var(--muted);
            opacity: 0;
            animation: fadeUp 0.7s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .signup a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1px;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .signup a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Decorative corner marks */
        .corner {
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0;
            animation: cornerIn 0.5s 1s ease forwards;
        }

        @keyframes cornerIn {
            to { opacity: 0.6; }
        }

        .corner-tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
        .corner-tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
        .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
        .corner-br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

        @media (max-width: 480px) {
            .login-card {
                margin: 20px;
                padding: 40px 28px 36px;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="login-card">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="header">
            <h1>Sign In</h1>
            <p>Enter your credentials to access the archive.</p>
        </div>

        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div class="signup">
            Don't have an account? <a href="#">Create one</a>
        </div>
    </div>
</body>
</html>
