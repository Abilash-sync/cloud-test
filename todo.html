<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To‑Do List - Code Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title { font-size: 28px; font-weight: 800; color: #111827; }
    .subtitle { font-size: 14px; color: #6b7280; }

    .list {
      display: grid;
      gap: 10px;
      list-style: none;
      margin-top: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      transition: box-shadow .2s, transform .2s, border-color .2s;
      background: #fff;
    }

    .item:hover { box-shadow: 0 8px 20px rgba(102,126,234,.18); transform: translateY(-1px); border-color: #e0e7ff; }

    /* Accessible custom checkbox */
    .checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #667eea;
      border-radius: 6px;
      display: grid;
      place-content: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .checkbox::after {
      content: '';
      width: 12px;
      height: 12px;
      transform: scale(0);
      transition: transform 160ms ease-out;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 3px;
    }

    .checkbox:checked { border-color: transparent; background: #eef2ff; }
    .checkbox:checked::after { transform: scale(1); }
    .checkbox:focus { outline: 3px solid #c7d2fe; outline-offset: 2px; }

    .label {
      color: #111827;
      line-height: 1.4;
    }

    /* Strike-through completed items using sibling selector */
    .checkbox:checked + .label { color: #6b7280; text-decoration: line-through; }

    .tag {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
      border: 1px solid #e0e7ff;
      white-space: nowrap;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed #e5e7eb;
      color: #6b7280;
      font-size: 13px;
    }

    .hint { color: #6b7280; }
    .hint kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
    }

    @media (max-width: 520px) {
      .item { grid-template-columns: 28px 1fr; }
      .tag { display: none; }
    }
  </style>
</head>
<body>
  <main class="app" aria-labelledby="title">
    <header class="header">
      <h1 id="title" class="title">To‑Do List</h1>
      <p class="subtitle">Check items to mark them complete</p>
    </header>

    <ul class="list">
      <li class="item">
        <input class="checkbox" type="checkbox" id="task-1" />
        <label class="label" for="task-1">Design the task list layout and card style</label>
        <span class="tag" aria-hidden="true">Design</span>
      </li>

      <li class="item">
        <input class="checkbox" type="checkbox" id="task-2" />
        <label class="label" for="task-2">Write responsive CSS for mobile and desktop</label>
        <span class="tag" aria-hidden="true">CSS</span>
      </li>

      <li class="item">
        <input class="checkbox" type="checkbox" id="task-3" />
        <label class="label" for="task-3">Create accessible custom checkboxes</label>
        <span class="tag" aria-hidden="true">A11y</span>
      </li>

      <li class="item">
        <input class="checkbox" type="checkbox" id="task-4" />
        <label class="label" for="task-4">Polish hover, focus, and active states</label>
        <span class="tag" aria-hidden="true">Polish</span>
      </li>

      <li class="item">
        <input class="checkbox" type="checkbox" id="task-5" />
        <label class="label" for="task-5">Review contrast and readability</label>
        <span class="tag" aria-hidden="true">QA</span>
      </li>
    </ul>

    <div class="footer">
      <span class="hint">Tip: Toggle with your mouse or use <kbd>Tab</kbd> + <kbd>Space</kbd></span>
      <span>Pure HTML + CSS</span>
    </div>
  </main>
</body>
</html>
