<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blue Page</title>
    <meta name="description" content="A simple single-page HTML document with a blue background" />
    <style>
      :root {
        --blue: #1e90ff; /* Vivid blue for good contrast with dark text */
        --text: #111111;
        --card-bg: rgba(255, 255, 255, 0.85);
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--blue);
        color: var(--text);
        line-height: 1.6;
        display: grid;
        place-items: center;
      }
      .card {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: var(--radius);
        max-width: 720px;
        width: min(92vw, 720px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        backdrop-filter: blur(6px);
      }
      h1 { margin: 0 0 0.5rem; font-size: clamp(1.75rem, 3vw + 1rem, 3rem); }
      p { margin: 0; font-size: 1.05rem; }
      .tag {
        display: inline-block;
        margin-top: 1rem;
        background: #fff;
        color: #333;
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        font-size: 0.9rem;
        border: 1px solid rgba(0,0,0,0.08);
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-label="Blue page content">
      <h1>Blue</h1>
      <p>This is a simple HTML page with a blue background.</p>
      <span class="tag" aria-hidden="true">#1e90ff</span>
    </main>
  </body>
</html>
